name: Build Megan Apps APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'
    
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
    
    - name: Build web app
      run: npm run build
    
    - name: Initialize Capacitor
      run: |
        npx cap init "Megan Apps" com.megan.apps --web-dir=dist
        npx cap add android
    
    - name: Configure Capacitor
      run: |
        cat > capacitor.config.json << 'CAPEOF'
        {
          "appId": "com.megan.apps",
          "appName": "Megan Apps",
          "webDir": "dist",
          "server": {
            "androidScheme": "https",
            "cleartext": true,
            "allowNavigation": [
              "appapi.megan.qzz.io",
              "megan.qzz.io",
              "*.megan.qzz.io"
            ]
          },
          "plugins": {
            "SplashScreen": {
              "launchShowDuration": 2000,
              "backgroundColor": "#0a0a0f",
              "showSpinner": true,
              "spinnerColor": "#6366f1"
            },
            "StatusBar": {
              "style": "dark",
              "backgroundColor": "#0a0a0f"
            },
            "Browser": {
              "presentationStyle": "fullscreen"
            },
            "GoogleAuth": {
              "scopes": ["profile", "email"],
              "serverClientId": "599593422056-f4lpouihf09j8r33ibd6b6n8u9oqo81f.apps.googleusercontent.com",
              "forceCodeForRefreshToken": true
            }
          }
        }
        CAPEOF
    
    - name: Configure Gradle
      run: |
        echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties
    
    - name: Sync Capacitor
      run: npx cap sync android
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: megan-apps
        path: android/app/build/outputs/apk/debug/app-debug.apk
